services:
  backend:
    image: chd-campus-dev-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 3000
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_NAME: changan_campus_service
      DB_USER: root
      DB_PASSWORD: 3709Lp
      JWT_SECRET: dev-secret-change-me-dev-secret-change-me
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173
      FRONTEND_BASE_URL: http://127.0.0.1:5173
      PAYMENT_PROVIDER_DEFAULT: mock
      PAYMENT_MOCK_ENABLED: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: chd-campus-dev-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
