services:
  backend:
    image: chd-campus-prod-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 3000
      DB_HOST: new-api-mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-changan_campus_service}
      DB_USER: ${DB_USER:-campus}
      DB_PASSWORD: ${DB_PASSWORD:-3709Lp}
      JWT_SECRET: ${JWT_SECRET:-please-change-this-production-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080,https://changdaehome.oneais.dev}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://127.0.0.1:8080}
      PAYMENT_PROVIDER_DEFAULT: ${PAYMENT_PROVIDER_DEFAULT:-mock}
      PAYMENT_MOCK_ENABLED: ${PAYMENT_MOCK_ENABLED:-true}
    ports:
      - "${BACKEND_HOST_PORT:-3001}:3000"
    networks:
      - default
      - new-api-default
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health | grep -q 'ok'"]
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    image: chd-campus-prod-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

networks:
  new-api-default:
    external: true
    name: new-api_default
